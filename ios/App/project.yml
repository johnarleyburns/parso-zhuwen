name: ZhuwenApp

# The @main app target, vendored into the repo (MC-1) so agents can build the real app with
# `make app` — no manual Xcode assembly. XcodeGen (MIT, build-time only) generates the .xcodeproj
# from this spec; the generated project is git-ignored (regenerate deterministically from here).
#
# Signing is left OFF at project level so simulator builds (`make app`, `make app-test`, CI) need
# no credentials. The TestFlight workflow (.github/workflows/testflight.yml) overrides the signing
# settings on the xcodebuild command line and uses App Store Connect API cloud signing.

options:
  bundleIdPrefix: guru.parso.zhuwen
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGN_IDENTITY: ""

packages:
  Zhuwen:
    path: ..

targets:
  ZhuwenApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: ../Fixtures/fixture-a2-v0.zpack
        buildPhase: resources
      - path: ../Fixtures/zhuwen-dev.pub
        buildPhase: resources
    dependencies:
      - package: Zhuwen
        product: ZhuwenUI
      - package: Zhuwen
        product: ZhuwenCore
      - package: Zhuwen
        product: ZhuwenPacks
      - package: Zhuwen
        product: ZhuwenAudio
      - package: Zhuwen
        product: ZhuwenPersistence
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Zhuwen
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.zhuwen
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  ZhuwenAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: ZhuwenApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.zhuwen.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: ZhuwenApp

schemes:
  ZhuwenApp:
    build:
      targets:
        ZhuwenApp: all
        ZhuwenAppUITests: [test]
    test:
      targets:
        - ZhuwenAppUITests
