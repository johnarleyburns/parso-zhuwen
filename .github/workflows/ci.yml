name: CI

# iOS (Swift) CI + TestFlight. Every push to main runs unit tests + I2 audit, then
# automatically builds and uploads a fresh TestFlight build (parso-tonearm pattern).
# The Go factory has its own workflow (factory-ci.yml). The heavier integration/e2e suites
# (placement-simulation, karaoke-drift, 50k-event replay perf) + the NFR-2 benchmark are
# guarded locally by the pre-push hook AND re-run here on a weekly schedule as a hosted signal
# (MC-3: per-PR macOS unit kept because it is fast; weekly job covers the heavy suites).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — weekly full iOS suite

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  ios-unit:
    name: iOS unit (Swift)
    if: github.event_name != 'schedule'
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
      - name: swift version
        run: swift --version
      - name: unit tests
        run: make test-unit
      - name: network-surface audit (I2)
        run: make audit

  ios-full:
    name: iOS full suite (weekly)
    if: github.event_name == 'schedule'
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4
      - name: swift version
        run: swift --version
      - name: full test suite (incl. integration + replay perf)
        run: make test
      - name: NFR-2 selector benchmark
        run: make bench
      - name: network-surface audit (I2)
        run: make audit

  testflight:
    name: TestFlight build & upload
    needs: ios-unit
    if: github.event_name != 'pull_request' && github.event_name != 'schedule'
    runs-on: macos-15
    env:
      APP_DIR: ios/App
      SCHEME: ZhuwenApp
      BUNDLE_ID: guru.parso.zhuwen
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          echo "Using $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.APP_DIR }}
        run: xcodegen generate

      - name: Compute version
        run: |
          set -euo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD" >> "$GITHUB_ENV"
          echo "MKT_VERSION=1.0.$BUILD" >> "$GITHUB_ENV"
          echo "Marketing version: 1.0.$BUILD (build $BUILD)"

      - name: Import signing certificate into a temporary keychain
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/zhuwen.keychain-db"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/dist.p12"

      - name: Write App Store Connect API key
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPSTORE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/**/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Archive (App Store Connect cloud signing)
        working-directory: ${{ env.APP_DIR }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project "$SCHEME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=YES \
            MARKETING_VERSION="$MKT_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive 2>&1 | tee archive.log

      - name: Export & upload to TestFlight
        working-directory: ${{ env.APP_DIR }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"

      - name: Summary
        run: |
          echo "### :rocket: TestFlight upload" >> "$GITHUB_STEP_SUMMARY"
          echo "Build **$BUILD_NUMBER** of **$BUNDLE_ID** uploaded to TestFlight." >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload archive log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testflight-archive-log
          path: ${{ env.APP_DIR }}/archive.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/zhuwen.keychain-db" || true
          rm -f "$RUNNER_TEMP/private_keys/AuthKey_"*.p8
