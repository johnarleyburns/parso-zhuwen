name: testflight

# MC-3 (extension): build the Zhuwen app and upload it to TestFlight. Manual trigger
# (workflow_dispatch); a push to a testflight/** branch also runs it for setup/iteration.
# Signing is MANUAL (parso-tonearm pattern): a pre-made Apple Distribution cert + a pre-made
# App Store provisioning profile are imported; xcodebuild NEVER mints new certs/profiles
# (no -allowProvisioningUpdates, no Automatic signing).
#
# Required repo secrets (set via `gh secret set`):
#   APPSTORE_API_KEY_ID, APPSTORE_ISSUER_ID, APPSTORE_API_PRIVATE_KEY   (App Store Connect API)
#   DIST_CERT_P12_BASE64, DIST_CERT_PASSWORD                            (Apple Distribution cert)
#   PROVISIONING_PROFILE_BASE64                                         (App Store .mobileprovision)
#   KEYCHAIN_PASSWORD                                                   (temp CI keychain)
#   APPLE_TEAM_ID                                                       (Developer Team ID)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  testflight:
    name: build & upload to TestFlight
    runs-on: macos-15
    env:
      APP_DIR: ios/App
      SCHEME: ZhuwenApp
      BUNDLE_ID: guru.parso.zhuwen
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)"
          echo "Using $latest"
          sudo xcode-select -s "$latest/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.APP_DIR }}
        run: xcodegen generate

      - name: Import signing certificate into a temporary keychain
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/zhuwen.keychain-db"
          echo "$DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Make the temp keychain visible to the build.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/dist.p12"

      - name: Install provisioning profile (manual signing — never mint certs)
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" > "$RUNNER_TEMP/profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/profile.plist")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/profile.plist")
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PP_DIR/$PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Installed provisioning profile '$PROFILE_NAME' ($PROFILE_UUID)"

      - name: Write App Store Connect API key
        env:
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$APPSTORE_API_PRIVATE_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8"

      - name: Archive (App Store Connect cloud signing)
        working-directory: ${{ env.APP_DIR }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          # Monotonic build/version from git commit count (parso-tonearm pattern).
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD" >> "$GITHUB_ENV"
          echo "MKT_VERSION=1.0.$BUILD" >> "$GITHUB_ENV"
          echo "Marketing version: 1.0.$BUILD (build $BUILD)"
          xcodebuild -project "$SCHEME.xcodeproj" -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGNING_ALLOWED=YES CODE_SIGNING_REQUIRED=YES \
            MARKETING_VERSION="$MKT_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

      - name: Export .ipa
        working-directory: ${{ env.APP_DIR }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"

      - name: Summary
        run: |
          echo "Uploaded build $BUILD_NUMBER of $BUNDLE_ID to TestFlight (App Store Connect)."
          ls -la "$RUNNER_TEMP/export" || true
